; Gruvbox polybar — matches DWM config.h
; Colors from: col_gray1 = #282828, col_gray2 = #444444
; Font: Terminus Bold 14 (adjust to your installed name)

[colors]
bg         = #282828
bg-alt     = #3c3836
bg-sel     = #504945
fg         = #ebdbb2
fg-dim     = #a89984
separator  = #504945
; Gruvbox accents
yellow     = #fabd2f
green      = #b8bb26
blue       = #83a598
red        = #fb4934
orange     = #fe8019
aqua       = #8ec07c
purple     = #d3869b

[bar/top]
width            = 100%
height           = 23
top              = true
override-redirect = true        ; required for sxwm
background = ${colors.bg}
foreground = ${colors.fg}
font-0 = Terminess Nerd Font:style=Bold:weight=bold:size=13;2
line-size  = 2
line-color = ${colors.yellow}
padding-left  = 0
padding-right = 1
module-margin-left  = 0
module-margin-right = 0
separator     = %{F#504945}|%{F-}
separator-margin = 1
modules-left   = xworkspaces xwindow
modules-center =
modules-right  = cpu memory pulseaudio battery date
cursor-click  = pointer
cursor-scroll = ns-resize
; Uncomment if using a wm-restack compatible WM:
; wm-restack = bspwm

[module/xworkspaces]
type = internal/xworkspaces
pin-workspaces = true
n-workspaces = 5
label-active            = %index%
label-active-background = ${colors.bg-sel}
label-active-foreground = ${colors.yellow}
label-active-underline  = ${colors.yellow}
label-active-padding    = 2
label-occupied            = %index%
label-occupied-foreground = ${colors.fg}
label-occupied-padding    = 2
label-urgent            = %index%
label-urgent-foreground = ${colors.red}
label-urgent-padding    = 0
label-empty            = ""
label-empty-foreground = ${colors.separator}
; label-empty-padding    = 2

[module/xwindow]
type = internal/xwindow
label = %{F#504945}|%{F-} %title:0:60:...%
label-foreground = ${colors.fg-dim}

[module/cpu]
type             = internal/cpu
interval         = 2
format-prefix    = "CPU "
format-prefix-foreground = ${colors.fg-dim}
label            = %{F#b8bb26}%percentage%%%{F-}
label-padding-right = 1

[module/memory]
type             = internal/memory
interval         = 2
format-prefix    = "MEM "
format-prefix-foreground = ${colors.fg-dim}
label            = %{F#fabd2f}%mb_used%%{F-}
label-padding-right = 1

[module/pulseaudio]
type = internal/pulseaudio
format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.fg-dim}
label-volume = %{F#fe8019}%percentage%%%{F-}
label-volume-padding-right = 1
label-muted            = %{F#504945}MUTE%{F-}
label-muted-padding-right = 1
click-right = pavucontrol

[module/battery]
type = custom/script
exec = bash -c 'BAT="/sys/class/power_supply/BAT0"; P=$(cat $BAT/capacity); S=$(cat $BAT/status); ICON=""; if [ "$S" = "Charging" ]; then ICON=""; elif [ "$P" -le 20 ]; then ICON=""; fi; echo "$ICON $P%"'
interval = 10
label-padding-right = 1

[module/date]
type     = internal/date
interval = 1
date     = %a %d %b
time     = %I:%M:%S %p
label    = %date%  %time%
label-foreground = ${colors.fg}
